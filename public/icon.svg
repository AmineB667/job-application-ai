<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" fill="none">
  <!-- Document page -->
  <path d="M6 10 Q6 5 11 5 H66 L80 19 V96 Q80 101 75 101 H11 Q6 101 6 96 Z" fill="#111111"/>
  <!-- fold -->
  <path d="M66 5 L66 19 L80 19 Z" fill="#444444"/>

  <!-- Person head (white) -->
  <circle cx="33" cy="30" r="12" fill="white"/>
  <!-- Person bust (white) -->
  <path d="M16 57 Q16 43 33 43 Q50 43 50 57 Z" fill="white"/>

  <!-- Lines right of person (white) -->
  <rect x="56" y="23" width="17" height="4" rx="2" fill="white"/>
  <rect x="56" y="32" width="13" height="4" rx="2" fill="white"/>
  <rect x="56" y="41" width="15" height="4" rx="2" fill="white"/>

  <!-- Lines below (white) -->
  <rect x="13" y="64" width="57" height="4" rx="2" fill="white" opacity="0.7"/>
  <rect x="13" y="73" width="50" height="4" rx="2" fill="white" opacity="0.7"/>
  <rect x="13" y="82" width="42" height="4" rx="2" fill="white" opacity="0.7"/>

  <!-- Briefcase handle -->
  <path d="M72 74 L72 66 Q72 60 78 60 L94 60 Q100 60 100 66 L100 74"
        stroke="#111111" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Briefcase body -->
  <rect x="60" y="74" width="52" height="36" rx="5" fill="#111111"/>
  <!-- Divider -->
  <line x1="60" y1="92" x2="112" y2="92" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- Latch -->
  <rect x="76" y="85" width="16" height="10" rx="2.5" fill="white"/>
</svg>
