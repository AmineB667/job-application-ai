<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 215 52" fill="none">
  <defs>
    <!-- J front (left): medium gray → black -->
    <linearGradient id="j1" x1="17" y1="5" x2="17" y2="47" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8a8a8a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <!-- J back (right): light gray → medium gray -->
    <linearGradient id="j2" x1="31" y1="5" x2="31" y2="47" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4d4d4"/>
      <stop offset="100%" stop-color="#8a8a8a"/>
    </linearGradient>
  </defs>

  <!-- J2 — back, rendered first -->
  <path d="M 31,5 L 31,35 Q 31,47 21,47 Q 15,47 15,40"
        stroke="url(#j2)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- J1 — front, overlaps J2 -->
  <path d="M 17,5 L 17,35 Q 17,47 7,47 Q 1,47 1,40"
        stroke="url(#j1)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Vertical separator -->
  <line x1="51" y1="9" x2="51" y2="43" stroke="#e2e8f0" stroke-width="1"/>

  <!-- "JobApplication" bold black + ".fr" gray -->
  <text x="61" y="33"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="14" font-weight="800" letter-spacing="-0.4">
    <tspan fill="#111827">JobApplication</tspan><tspan fill="#6b7280">.fr</tspan>
  </text>
</svg>
