<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" fill="none">
  <!-- ── Document page ── -->
  <path d="M4 8 Q4 3 9 3 H64 L78 17 V88 Q78 93 73 93 H9 Q4 93 4 88 Z" fill="#111111"/>
  <!-- fold triangle -->
  <path d="M64 3 L64 17 L78 17 Z" fill="#444444"/>

  <!-- Person head (white) -->
  <circle cx="30" cy="27" r="11" fill="white"/>
  <!-- Person bust/shoulders (white) -->
  <path d="M14 52 Q14 39 30 39 Q46 39 46 52 Z" fill="white"/>

  <!-- Lines right of person (white) — resume header area -->
  <rect x="51" y="21" width="18" height="3.5" rx="1.75" fill="white"/>
  <rect x="51" y="29" width="14" height="3.5" rx="1.75" fill="white"/>
  <rect x="51" y="37" width="16" height="3.5" rx="1.75" fill="white"/>

  <!-- Horizontal lines below (white) — resume body -->
  <rect x="11" y="58" width="55" height="3.5" rx="1.75" fill="white" opacity="0.7"/>
  <rect x="11" y="66" width="48" height="3.5" rx="1.75" fill="white" opacity="0.7"/>
  <rect x="11" y="74" width="40" height="3.5" rx="1.75" fill="white" opacity="0.7"/>

  <!-- ── Briefcase ── -->
  <!-- Handle arch -->
  <path d="M70 67 L70 60 Q70 54 76 54 L90 54 Q96 54 96 60 L96 67"
        stroke="#111111" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Body -->
  <rect x="59" y="67" width="50" height="33" rx="5" fill="#111111"/>
  <!-- Horizontal divider -->
  <line x1="59" y1="83" x2="109" y2="83" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- Latch rectangle -->
  <rect x="74" y="77" width="14" height="9" rx="2" fill="white"/>

  <!-- ── Text ── -->
  <text x="122" y="62"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="25" font-weight="700" fill="#111111" letter-spacing="-0.4">
    Job Application AI
  </text>
</svg>
